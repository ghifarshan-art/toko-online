<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Multi-Role System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white rounded-3xl shadow-2xl flex flex-col md:flex-row max-w-4xl w-full overflow-hidden">
        <div class="md:w-1/2 bg-green-600 p-12 text-white flex flex-col justify-center">
            <h2 class="text-4xl font-bold mb-4">Pusat Kendali Toko</h2>
            <p class="text-green-100">Kelola bisnis Anda atau pantau ekosistem pasar dalam satu platform terintegrasi.</p>
        </div>

        <div class="md:w-1/2 p-10">
            <div class="mb-8 text-center md:text-left">
                <h1 class="text-2xl font-bold text-gray-800">Selamat Datang</h1>
                <p class="text-gray-500 text-sm">Silakan pilih peran dan masuk ke akun Anda</p>
            </div>

            <form id="loginForm">
                <div class="mb-6">
                    <label class="block text-xs font-bold uppercase text-gray-400 mb-2">Masuk Sebagai:</label>
                    <div class="grid grid-cols-2 gap-4">
                        <label class="cursor-pointer">
                            <input type="radio" name="role" value="seller" class="peer hidden" checked>
                            <div class="text-center p-3 border-2 rounded-xl peer-checked:border-green-600 peer-checked:bg-green-50 text-gray-600 peer-checked:text-green-600 transition">
                                <i class="fas fa-store mb-1 block"></i> Seller
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="role" value="admin" class="peer hidden">
                            <div class="text-center p-3 border-2 rounded-xl peer-checked:border-indigo-600 peer-checked:bg-indigo-50 text-gray-600 peer-checked:text-indigo-600 transition">
                                <i class="fas fa-user-shield mb-1 block"></i> Admin
                            </div>
                        </label>
                    </div>
                </div>

                <div class="space-y-4">
                    <div>
                        <input type="email" id="email" placeholder="Email Address" required
                            class="w-full px-4 py-3 rounded-xl bg-gray-50 border focus:border-green-500 outline-none transition">
                    </div>
                    <div>
                        <input type="password" id="password" placeholder="Password" required
                            class="w-full px-4 py-3 rounded-xl bg-gray-50 border focus:border-green-500 outline-none transition">
                    </div>
                </div>

                <button type="submit" id="loginBtn"
                    class="w-full bg-gray-800 hover:bg-black text-white font-bold py-3 rounded-xl mt-8 transition shadow-lg">
                    Login Sekarang
                </button>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
<script>
    document.getElementById('loginForm').addEventListener('submit', function (event) {
        event.preventDefault();

        // 1. Ambil data input
        const roleActive = document.querySelector('input[name="role"]:checked').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('loginBtn');

        // 2. Efek Loading
        const originalText = btn.innerText;
        btn.innerText = "Memverifikasi...";
        btn.disabled = true;
        btn.style.opacity = "0.7";

        setTimeout(() => {
            let success = false;

            // 3. Eksekusi Login berdasarkan Role
            if (roleActive === 'admin') {
                success = loginAdmin(email, password);
            } else {
                success = loginUser(email, password);
            }

            // 4. Penanganan Hasil
            if (success) {
                alert(`Berhasil! Selamat datang ${roleActive.toUpperCase()}`);
                
                if (roleActive === 'admin') {
                    window.location.href = "dashboard_admin.html"; 
                } else {
                    window.location.href = "etalase_user.html";
                }
            } else {
                // PESAN ERROR SPESIFIK SESUAI ROLE
                if (roleActive === 'admin') {
                    alert("Gagal! Admin Email atau password salah.");
                } else {
                    alert("Gagal! Akun Seller Email atau password salah.");
                }
                
                // Kembalikan tombol ke semula
                btn.innerText = originalText;
                btn.disabled = false;
                btn.style.opacity = "1";
            }
        }, 800);
    });
</script>
</body>

</html>
